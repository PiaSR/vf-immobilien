<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#e5e7eb"/>
  <g transform="translate(250, 130)">
    <!-- Roof -->
    <polygon points="150,0 300,130 0,130" fill="#c5cdd6"/>
    <!-- Chimney -->
    <rect x="210" y="30" width="30" height="70" fill="#b0bac4"/>
    <!-- House body -->
    <rect x="20" y="130" width="260" height="180" fill="#d1d9e0"/>
    <!-- Door -->
    <rect x="115" y="210" width="70" height="100" rx="35" fill="#b0bac4"/>
    <!-- Left window -->
    <rect x="40" y="155" width="70" height="60" rx="4" fill="#b0bac4"/>
    <line x1="75" y1="155" x2="75" y2="215" stroke="#c5cdd6" stroke-width="3"/>
    <line x1="40" y1="185" x2="110" y2="185" stroke="#c5cdd6" stroke-width="3"/>
    <!-- Right window -->
    <rect x="190" y="155" width="70" height="60" rx="4" fill="#b0bac4"/>
    <line x1="225" y1="155" x2="225" y2="215" stroke="#c5cdd6" stroke-width="3"/>
    <line x1="190" y1="185" x2="260" y2="185" stroke="#c5cdd6" stroke-width="3"/>
  </g>
  <text x="400" y="430" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#9ca3af">Kein Foto verfügbar</text>
</svg>
